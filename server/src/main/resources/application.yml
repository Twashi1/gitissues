logging:
  level:
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure: DEBUG

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/gitissues
    username: admin
    password: admin
    hikari:
      initialization-fail-timeout: -1
      connection-timeout: 10000
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false 
    # url: jdbc:postgresql://localhost:5432/gitissues
    # username: postgres
    # password: postgres

  jpa:
    hibernate:
      ddl-auto: none

